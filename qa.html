<body>
  <header class="site-header">
    <div class="container header-inner">
  <a class="brand" href="index.html"><img class="site-logo" src="assets/images/logo-committed.png" alt="Committed logo"> Committed Podcast</a>
      <nav class="nav">
        <a href="index.html">Home</a>

  <main class="container section">
    <h1>Q&A</h1>
    <p class="muted">Ask a question and Devin will reply directly to your email.</p>

    <section class="card">
      <div class="card-body">
        <h2 class="card-title">Submit Your Question</h2>

        <!-- FORM SUBMISSION HANDLES EMAIL DELIVERY -->
        <form action="https://formsubmit.co/devingreer20@icloud.com" method="POST" class="stack">

          <!-- Redirect to a thank-you page -->
          <input type="hidden" name="_next" value="thankyou.html">

          <!-- Disable spam -->
          <input type="hidden" name="_captcha" value="false">

          <label>
            Your Name
            <input class="input" type="text" name="name" required>
          </label>

          <label>
            Your Email
            <input class="input" type="email" name="email" required>
          </label>

          <label>
            Your Question
            <textarea class="input" name="question" rows="6" required></textarea>
          </label>

          <button class="button" type="submit">Send Question</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="muted">© <span id="year"></span> Committed Podcast</p>
      <div class="footer-social">

    </div>
